name: Deploy Docs Atlas Demo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-pages.yml'
      - 'apps/web/**'
      - 'packages/shared-types/**'
      - 'docs/**'
      - 'config.example.yaml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove local docs config
        run: rm -f config.yaml config.yml docs-atlas.config.yaml docs-atlas.config.yml docs-cms.config.yaml docs-cms.config.yml

      - name: Build demo site
        run: pnpm build:web
        env:
          GITHUB_PAGES: 'true'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
